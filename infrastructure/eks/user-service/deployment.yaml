apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: cnoaf
spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service
          image: <account-id>.dkr.ecr.<region>.amazonaws.com/cnoaf/user-service:latest

          ports:
            - containerPort: 8081
